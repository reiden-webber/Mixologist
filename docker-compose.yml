# Production-style frontend. For local dev: `npm run dev` from repo root (workspace).
# Optional: env_file: .env for future API keys (CocktailDB, LLM, etc.)
#
# Future services (uncomment when implemented):
#   backend — LangChain / HTTP API
#   mcp — stdio or sidecar MCP process

services:
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    # env_file:
    #   - .env
    environment:
      NODE_ENV: production
