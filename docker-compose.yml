# Full stack in Docker. Copy `.env.example` to `.env` at repo root and set ANTHROPIC_API_KEY
# (Compose loads `.env` for variable substitution automatically.)
#
# Browser → localhost:3000  |  Backend → localhost:4000  |  Mixologist → localhost:4100
# In-container: backend → http://mixologist:4100  |  Next server → http://backend:4000

services:
  mixologist:
    build:
      context: .
      dockerfile: mixologist-cli/Dockerfile
    ports:
      - "4100:4100"
    environment:
      NODE_ENV: production
      MCP_SERVER_PATH: /app/MCP_Server/dist/index.js
      MIXOLOGIST_HTTP_PORT: "4100"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      MIXOLOGIST_URL: http://mixologist:4100
    depends_on:
      mixologist:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
